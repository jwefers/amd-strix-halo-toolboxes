name: Build & Publish AMD Strix Halo Toolboxes

on:
  workflow_dispatch:
    inputs:
      backends:
        description: >
          Comma-separated backends to build (e.g. "rocm-7beta,rocm-7rc").
          Use "all" to build everything.
        required: false
        default: "rocm-7.2.3"

env:
  CONTAINER_REPO: gitea.wefers.page/julian/amd-strix-halo-toolboxes
  LOCAL_PREFIX: llama

jobs:
  # 1) Prepare a clean JSON array for the matrix
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.mk.outputs.matrix_json }}
    steps:
      - id: mk
        shell: bash
        run: |
          # Input from the Run workflow form
          IN='${{ inputs.backends }}'

          if [[ "$IN" == "all" || -z "$IN" ]]; then
            JSON='["rocm-6.4.4","rocm-7.2.3","rocm7-nightlies","vulkan-amdvlk","vulkan-radv"]'
          else
            # Remove spaces and build JSON array from comma list
            IN_CLEAN=$(echo "$IN" | tr -d '[:space:]')
            JSON='["'${IN_CLEAN//,/\",\"}'"]'
          fi

          echo "matrix_json=${JSON}" >> "$GITHUB_OUTPUT"
          echo "Using matrix: ${JSON}"

  # 2) Build each backend in parallel using the prepared matrix
  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: ${{ fromJson(needs.prepare.outputs.matrix_json) }}

    steps:
      - name: Free up runner disk space
        run: |
          echo "Before cleanup:" && df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          docker system prune --all --force
          docker builder prune --all --force
          echo "After cleanup:" && df -h /

      - name: Check out repository
        uses: actions/checkout@v4

      # - name: install podman, buildah
      #   run: |
      #     apt-get update && apt-get install -y podman buildah

      - name: Log in to gitea.wefers.page
        run: |
          podman --remote login gitea.wefers.page -u  ${{ secrets.REGISTRY_USERNAME}} -p ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set build timestamp
        run: echo "BUILD_TS=$(date +%Y%m%dT%H%M%S)" >> $GITHUB_ENV

      - name: Build & push ${{ matrix.backend }}
        working-directory: toolboxes
        shell: bash
        run: |
          set -euo pipefail
          B="${{ matrix.backend }}"
          DF="Dockerfile.$B"
          NAME="${B}"
          LI="${LOCAL_PREFIX}-${NAME}"
          TAG="${NAME}_${BUILD_TS}"
          IMM="${CONTAINER_REPO}:${TAG}"
          CHN="${CONTAINER_REPO}:${NAME}"
          BUILD_CACHE="${CONTAINER_REPO}:buildcache"

          echo "→ Building ${DF}"
          buildah bud \
            --squash \
            --format oci \
            --cache-from "${BUILD_CACHE}" \
            --cache-to "${BUILD_CACHE}" \
            -t "${LI}" \
            -f "${DF}" .

          echo "→ Running smoke test..."
          docker run --rm "${LI}" llama version
          docker run --rm "${LI}" llama-cli --help || { status=$?; echo "llama-cli exited with status $status"; [[ $status -eq 0 || $status -eq 1 || $status -eq 134 ]]; }
          docker run --rm "${LI}" llama-server --help || { status=$?; echo "llama-server exited with status $status"; [[ $status -eq 0 || $status -eq 1 || $status -eq 134 ]]; }

          echo "→ Tag & push immutable → ${IMM}"
          buildah tag "${LI}" "${IMM}"
          buildah push --compression-format zstd:chunked push "${IMM}"

          echo "→ Tag & push channel → ${CHN}"
          buildah tag "${IMM}" "${CHN}"
          buildah push --compression-format zstd:chunked "${CHN}"
